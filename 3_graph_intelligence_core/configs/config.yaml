# NB: secrets and account identifiers MUST be empty here per the platform
# contract (CLAUDE.md: "config.yaml passwords/secrets are always empty
# strings — real values come only from .env"). The orchestrator overlays
# the env vars at load time (see 3_graph_intelligence_core/configs/config.py
# `load_config`), so leaving these empty is safe and required for the
# repository to be checked in publicly without leaking real credentials.
tigergraph:
  host: ""                # set via .env  TIGERGRAPH_HOST
  graph: "ShadowGraph"
  restpp_port: 443
  username: ""            # set via .env  TIGERGRAPH_USERNAME (legacy auth only)
  password: ""            # set via .env  TIGERGRAPH_PASSWORD (legacy auth only)
  use_ssl: true
  gsql_secret: ""         # set via .env  TIGERGRAPH_GSQL_SECRET (canonical)
  deployment: "cloud"

nim:
  api_key: ""             # set via .env  NIM_API_KEY
  base_url: "https://integrate.api.nvidia.com/v1"
  llm_model: "nvidia/llama-3.1-nemotron-70b-instruct"
  embedding_model: "nvidia/llama-3.1-nemotron-70b-instruct"

ollama:
  base_url: "http://localhost:11434"
  llm_model: "llama3.2"
  embedding_model: "nomic-embed-text"

data:
  source_dir: "outputs"
  profiles:
    - "small"
    - "medium"
    - "hackathon_default"

ingestion:
  batch_size: 5000
  parallel_batches: 4
  upsert_mode: true
  validate_schema: true

graphrag:
  traversal_depth: 3
  top_k: 10
  max_context_tokens: 8000
  compression: "rule_based"
  provider: "nim"

cache:
  enabled: true
  traversal_ttl_seconds: 300
  neighborhood_ttl_seconds: 600
  subgraph_ttl_seconds: 900

logging:
  level: "INFO"
  trace_retrieval: true