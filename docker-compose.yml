# Shadow Network Intelligence — Docker Compose
#
# This compose file deploys THIS platform: orchestrator API + dashboard UI.
# It does NOT bundle TigerGraph; the platform's production target is
# TigerGraph Cloud (see .env.example for TIGERGRAPH_HOST + GSQL_SECRET).
#
# To bring it up:
#   1. Copy .env.example to .env and fill in TIGERGRAPH_HOST / SECRET / NIM_API_KEY
#   2. Generate data:  make generate-data
#   3. (optional) make enrich-corpus
#   4. docker compose up --build
#   5. Open http://localhost:5173 (dashboard) — orchestrator at :8000
#
# If TigerGraph is unreachable, the orchestrator engages OfflineFallback
# (local CSV) — every endpoint still answers; mode flips to OFFLINE.
#
# An older compose that booted TigerGraph's CopilotGraph product images
# (graphrag, chat-history, etc.) is kept at
# docker-compose.tigergraph-products.yml.example for reference only.

services:
  orchestrator:
    build:
      context: .
      dockerfile: 9_devops/docker/api.Dockerfile
    image: shadow-intel/orchestrator:latest
    container_name: shadow_orchestrator
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sensible defaults — every value here is overridable via .env.
      SNI_PREWARM_ON_START: "${SNI_PREWARM_ON_START:-1}"
      SNI_PREWARM_TOP_N:    "${SNI_PREWARM_TOP_N:-30}"
      SNI_PRESET_PREWARM:   "${SNI_PRESET_PREWARM:-0}"
      PYTHONUNBUFFERED:     "1"
    volumes:
      # Mount the generated data + corpus into the container so a re-run
      # of `make generate-data` on the host is immediately picked up
      # without a rebuild. Read-only for safety.
      - ./outputs:/code/outputs:ro
      - ./4_orchestrator_api/outputs:/code/4_orchestrator_api/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: 9_devops/docker/ui.Dockerfile
      args:
        # Build-time bake. The dashboard reads VITE_API_BASE_URL from
        # import.meta.env, so it must be set at build time, not runtime.
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
        VITE_API_PREFIX:   "${VITE_API_PREFIX:-/api/v1}"
    image: shadow-intel/dashboard:latest
    container_name: shadow_dashboard
    ports:
      - "5173:80"
    depends_on:
      - orchestrator
    restart: unless-stopped
