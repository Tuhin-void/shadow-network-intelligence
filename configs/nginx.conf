# Shadow Network Intelligence - Nginx Configuration

upstream graphrag_ui {
    server graphrag-ui:3000;
}

upstream graphrag_api {
    server graphrag:8000;
}

upstream tigergraph {
    server tigergraph:14240;
}

server {
    listen 80;
    server_name localhost;

    # Dashboard UI
    location / {
        proxy_pass http://graphrag_ui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API Endpoints
    location /api/ {
        proxy_pass http://graphrag_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # TigerGraph GSQL
    location /gsql/ {
        proxy_pass http://tigergraph;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://graphrag_api/health;
        proxy_http_version 1.1;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://graphrag_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
